---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hive-iceberg-postgres
spec:
  project: dbt-openmetadata-demo
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  sources:
    - repoURL: "registry-1.docker.io/bitnamicharts"
      path: postgresql
      # helm inspect chart oci://registry-1.docker.io/bitnamicharts/postgresql
      targetRevision: 16.6.3 # 17.4.0
      chart: postgresql
      helm:
        # TODO this breaks naming as long as we use the airflow stack yaml which needs this svc name
        releaseName: postgresql-hive-iceberg
        valuesObject:
          global:
            security:
              allowInsecureImages: true
          image:
            repository: bitnamilegacy/postgresql
          volumePermissions:
            image:
              repository: bitnamilegacy/os-shell
          metrics:
            image:
              repository: bitnamilegacy/postgres-exporter
          commonLabels:
            stackable.tech/vendor: Stackable
          primary:
            extendedConfiguration: "password_encryption=md5"
          auth:
            database: hive
            username: hive
            existingSecret: hive-iceberg-postgresql-credentials
    - repoURL: "http://forgejo-http:3000/stackable/openmetadata-dbt-demo.git"
      targetRevision: "main"
      path: platform/manifests/hive-iceberg-postgres/
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      selfHeal: true
      prune: true
