---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openmetadata-dependencies
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: dbt-openmetadata-demo
  destination:
    server: https://kubernetes.default.svc
    namespace: platform
  sources:
    - repoURL: "https://open-metadata.github.io/openmetadata-helm-charts"
      chart: openmetadata-dependencies
      targetRevision: "1.12.1" # renovate: registryUrl=https://open-metadata.github.io/openmetadata-helm-charts datasource=helm depName=openmetadata-dependencies
      helm:
        releaseName: openmetadata-dependencies
        valuesObject:
          mysql:
            enabled: false
          airflow:
            enabled: false
#    - repoURL: "http://forgejo-http.deployment.svc.cluster.local:3000/stackable/openmetadata-dbt-demo.git"
#      targetRevision: "main"
#      path: platform/manifests/openmetadata-dependencies/
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      selfHeal: true
      prune: true
