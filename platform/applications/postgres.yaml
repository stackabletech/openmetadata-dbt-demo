---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: postgres
spec:
  generators:
    - list:
        elements:
          - component: airflow
            extendedConfiguration: ""
          - component: hive
            extendedConfiguration: "password_encryption=md5"
          - component: hive-iceberg
            extendedConfiguration: "password_encryption=md5"
          - component: openmetadata
            extendedConfiguration: ""
          - component: superset
            extendedConfiguration: ""
  template:
    metadata:
      name: "{{component}}-postgres"
    spec:
      project: dbt-openmetadata-demo
      destination:
        server: https://kubernetes.default.svc
        namespace: shared
      sources:
        - repoURL: "registry-1.docker.io/bitnamicharts"
          path: postgresql
          # helm inspect chart oci://registry-1.docker.io/bitnamicharts/postgresql
          targetRevision: 16.6.3 # renovate: registryUrl=https://registry-1.docker.io/bitnamicharts datasource=helm depName=postgresql
          chart: postgresql
          helm:
            releaseName: "postgresql-{{component}}"
            valuesObject:
              global:
                security:
                  allowInsecureImages: true
              image:
                repository: bitnamilegacy/postgresql
              volumePermissions:
                image:
                  repository: bitnamilegacy/os-shell
              metrics:
                image:
                  repository: bitnamilegacy/postgres-exporter
              commonLabels:
                stackable.tech/vendor: Stackable
              primary:
                extendedConfiguration: "{{extendedConfiguration}}"
              auth:
                database: "{{component}}"
                username: "{{component}}"
                password: "{{component}}"
      syncPolicy:
        syncOptions:
          - CreateNamespace=true
        automated:
          selfHeal: true
          prune: true
