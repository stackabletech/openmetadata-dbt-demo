---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: lakekeeper
  namespace: deployment
spec:
  project: dbt-openmetadata-demo
  destination:
    server: https://kubernetes.default.svc
    namespace: platform
  sources:
    - repoURL: "https://lakekeeper.github.io/lakekeeper-charts"
      chart: lakekeeper
      targetRevision: "0.9.0" # renovate: registryUrl=https://lakekeeper.github.io/lakekeeper-charts datasource=helm depName=lakekeeper
      helm:
        releaseName: lakekeeper
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      selfHeal: true
      prune: true
