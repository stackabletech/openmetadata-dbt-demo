---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openmetadata
  namespace: deployment
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: dbt-openmetadata-demo
  destination:
    server: https://kubernetes.default.svc
    namespace: platform
  sources:
    - repoURL: "https://open-metadata.github.io/openmetadata-helm-charts"
      chart: openmetadata
      targetRevision: "1.12.1" # renovate: registryUrl=https://open-metadata.github.io/openmetadata-helm-charts datasource=helm depName=openmetadata
      helm:
        releaseName: openmetadata
        valuesObject:
          openmetadata:
            config:
              elasticsearch:
                enabled: true
                host: simple-opensearch-nodes-default
                searchType: opensearch
                port: 9200
                scheme: https
                trustStore:
                  enabled: true
                  path: /certs-jks/truststore.jks
                  password:
                    secretRef: openmetadata-truststore-credentials
                    secretKey: openmetadata-truststore-password
                auth:
                  enabled: true
                  username: "openmetadata"
                  password:
                    secretRef: opensearch-openmetadata-credentials
                    secretKey: password
              database:
                host: postgresql-openmetadata.shared.svc.cluster.local
                port: 5432
                driverClass: org.postgresql.Driver
                dbScheme: postgresql
                databaseName: openmetadata
                auth:
                  username: openmetadata
                  password:
                    secretRef: postgresql-openmetadata
                    secretKey: openmetadata-postgresql-password
                dbParams: ""
              # No Airflow deploy step needed with the k8s pipeline client
              deployPipelinesConfig:
                enabled: false
              pipelineServiceClientConfig:
                type: "k8s"
                metadataApiEndpoint: http://openmetadata:8585/api # default value
                k8s:
                  # Container image for ingestion jobs
                  ingestionImage: "docker.getcollate.io/openmetadata/ingestion-base:1.12.1"
              authentication:
                provider: "custom-oidc"
                publicKeys:
                  - "$(ISSUER_URL)/protocol/openid-connect/certs"
                authority: "$(ISSUER_URL)"
                clientId: "openmetadata"
                callbackUrl: "http://$(NODE_IP):30585/callback"
              authorizer:
                className: "org.openmetadata.service.security.DefaultAuthorizer"
                containerRequestFilter: "org.openmetadata.service.security.JwtFilter"
                initialAdmins:
                  - "demo-admin"
                principalDomain: "stackable.demo"
            extraEnvs:
              - name: NODE_IP
                valueFrom:
                  configMapKeyRef:
                    name: oidc-endpoints
                    key: node-ip
              - name: ISSUER_URL
                valueFrom:
                  configMapKeyRef:
                    name: oidc-endpoints
                    key: issuer-url
          extraInitContainers:
            - name: convert-truststore
              image: eclipse-temurin:21-jre
              command:
                - sh
                - -c
                - |
                  keytool -importcert \
                    -file /certs-pem/ca.crt \
                    -keystore /certs-jks/truststore.jks \
                    -storetype JKS \
                    -storepass changeit \
                    -alias stackable-ca \
                    -noprompt
              volumeMounts:
                - name: ca-cert
                  mountPath: /certs-pem
                  readOnly: true
                - name: certs-jks
                  mountPath: /certs-jks
          extraVolumes:
            - name: ca-cert
              configMap:
                name: openmetadata-tls-truststore
            - name: certs-jks
              emptyDir: {}
          extraVolumeMounts:
            - name: certs-jks
              mountPath: /certs-jks
              readOnly: true
    - repoURL: "http://forgejo-http.deployment.svc.cluster.local:3000/stackable/openmetadata-dbt-demo.git"
      targetRevision: "main"
      path: platform/manifests/openmetadata/
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      selfHeal: true
      prune: true
