---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openmetadata
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: dbt-openmetadata-demo
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  sources:
    - repoURL: "https://open-metadata.github.io/openmetadata-helm-charts"
      chart: openmetadata
      targetRevision: "1.12.1" # renovate: registryUrl=https://open-metadata.github.io/openmetadata-helm-charts datasource=helm depName=openmetadata
      helm:
        releaseName: openmetadata
        valuesObject:
          openmetadata:
            config:
              elasticsearch:
                enabled: true
                host: simple-opensearch-nodes-default
                searchType: opensearch
                port: 9200
                scheme: https
                trustStore:
                  enabled: true
                  path: /certs/ca.crt
                auth:
                  enabled: true
                  username: "admin"
                  password:
                    secretRef: openmetadata-opensearch-credentials
                    secretKey: openmetadata-elasticsearch-password
              database:
                host: postgresql-openmetadata
                port: 5432
                driverClass: org.postgresql.Driver
                dbScheme: postgresql
                databaseName: openmetadata
                auth:
                  username: openmetadata
                  password:
                    secretRef: postgresql-openmetadata
                    secretKey: password
                dbParams: ""
              # No Airflow deploy step needed with the k8s pipeline client
              deployPipelinesConfig:
                enabled: false
              pipelineServiceClientConfig:
                type: "k8s"
                metadataApiEndpoint: http://openmetadata:8585/api # default value
                k8s:
                  # Container image for ingestion jobs
                  ingestionImage: "docker.getcollate.io/openmetadata/ingestion-base:1.12.1"
          extraVolumes:
            - name: tls
              ephemeral:
                volumeClaimTemplate:
                  metadata:
                    annotations:
                      secrets.stackable.tech/class: tls
                      secrets.stackable.tech/scope: pod
                  spec:
                    storageClassName: secrets.stackable.tech
                    accessModes:
                      - ReadWriteOnce
                    resources:
                      requests:
                        storage: "1"
          extraVolumeMounts:
            - name: tls
              mountPath: /certs
    - repoURL: "http://forgejo-http:3000/stackable/openmetadata-dbt-demo.git"
      targetRevision: "main"
      path: platform/manifests/openmetadata/
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      selfHeal: true
      prune: true
