---
apiVersion: trino.stackable.tech/v1alpha1
kind: TrinoCluster
metadata:
  name: trino
  namespace: platform
spec:
  clusterOperation:
    stopped: false
  image:
    productVersion: "477"
  clusterConfig:
    catalogLabelSelector:
      matchLabels:
        trino: trino
    vectorAggregatorConfigMapName: vector-aggregator-discovery
    authentication:
      - authenticationClass: trino-keycloak
        oidc:
          clientCredentialsSecret: trino-keycloak-client
      - authenticationClass: trino-users
  coordinators:
    roleConfig:
      listenerClass: external-unstable
    config:
      logging:
        enableVectorAgent: true
    podOverrides: &vectorPodOverrides
      spec:
        containers:
          - name: vector
            resources:
              requests:
                memory: 128Mi
              limits:
                memory: 512Mi
    roleGroups:
      default:
        replicas: 1
  workers:
    config:
      logging:
        enableVectorAgent: true
    podOverrides: *vectorPodOverrides
    roleGroups:
      default:
        replicas: 2