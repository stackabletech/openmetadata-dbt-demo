---
apiVersion: trino.stackable.tech/v1alpha1
kind: TrinoCluster
metadata:
  name: trino
  namespace: platform
spec:
  clusterOperation:
    stopped: false
  image:
    productVersion: "477"
  clusterConfig:
    catalogLabelSelector:
      matchLabels:
        trino: trino
    vectorAggregatorConfigMapName: vector-aggregator-discovery
  coordinators:
    roleConfig:
      listenerClass: external-unstable
    config:
      logging:
        enableVectorAgent: true
    roleGroups:
      default:
        replicas: 1
  workers:
    config:
      logging:
        enableVectorAgent: true
    roleGroups:
      default:
        replicas: 3