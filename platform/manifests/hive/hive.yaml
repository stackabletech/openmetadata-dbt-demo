---
apiVersion: hive.stackable.tech/v1alpha1
kind: HiveCluster
metadata:
  name: hive-postgres-hdfs
  namespace: platform
spec:
  image:
    productVersion: 3.1.3
  clusterConfig:
    database:
      connString: jdbc:postgresql://postgresql-hive.shared.svc.cluster.local:5432/hive
      credentialsSecret: hive-postgresql-credentials
      dbType: postgres
    hdfs:
      configMap: simple-hdfs
    vectorAggregatorConfigMapName: vector-aggregator-discovery
  metastore:
    config:
      logging:
        enableVectorAgent: true
    roleGroups:
      default:
        replicas: 1