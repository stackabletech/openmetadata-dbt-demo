---
apiVersion: hive.stackable.tech/v1alpha1
kind: HiveCluster
metadata:
  name: hive-postgres-hdfs
spec:
  image:
    productVersion: 3.1.3
  clusterConfig:
    database:
      connString: jdbc:postgresql://postgresql-hive:5432/hive
      credentialsSecret: hive-postgresql-credentials
      dbType: postgres
    hdfs:
      configMap: simple-hdfs
  metastore:
    roleGroups:
      default:
        replicas: 1