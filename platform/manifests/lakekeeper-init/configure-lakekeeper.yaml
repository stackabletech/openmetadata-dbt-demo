---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: lakekeeper-init
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: lakekeeper-init
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: lakekeeper-init
subjects:
  - kind: ServiceAccount
    name: lakekeeper-init
roleRef:
  kind: Role
  name: lakekeeper-init
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: lakekeeper-init-script
data:
  configure.sh: |
    #!/bin/sh
    set -e

    LAKEKEEPER_URL="http://lakekeeper:8181"

    echo "=== Lakekeeper Init ==="

    # Step 1: Wait for Lakekeeper to be healthy
    echo "Waiting for Lakekeeper to be ready..."
    for i in $(seq 1 60); do
      if curl -sf "$LAKEKEEPER_URL/health" >/dev/null 2>&1; then
        echo "  Lakekeeper is ready."
        break
      fi
      if [ "$i" -eq 60 ]; then
        echo "ERROR: Lakekeeper not ready after 60 attempts"
        exit 1
      fi
      echo "  Attempt $i/60 - not ready, retrying in 5s..."
      sleep 5
    done

    # Step 2: Wait for GarageFS credentials Secret
    echo "Waiting for garagefs-lakekeeper-credentials Secret..."
    for i in $(seq 1 60); do
      if kubectl get secret garagefs-lakekeeper-credentials >/dev/null 2>&1; then
        echo "  Secret found."
        break
      fi
      if [ "$i" -eq 60 ]; then
        echo "ERROR: Secret not found after 60 attempts"
        exit 1
      fi
      echo "  Attempt $i/60 - not found, retrying in 5s..."
      sleep 5
    done

    # Step 3: Read credentials from Secret
    KEY_ID=$(kubectl get secret garagefs-lakekeeper-credentials -o jsonpath='{.data.accessKeyId}' | base64 -d)
    KEY_SECRET=$(kubectl get secret garagefs-lakekeeper-credentials -o jsonpath='{.data.secretAccessKey}' | base64 -d)

    if [ -z "$KEY_ID" ] || [ -z "$KEY_SECRET" ]; then
      echo "ERROR: Failed to read credentials from Secret"
      exit 1
    fi
    echo "  Credentials loaded (Key ID: $KEY_ID)"

    # Step 4: Bootstrap Lakekeeper (idempotent - 409 means already bootstrapped)
    echo "Bootstrapping Lakekeeper..."
    HTTP_CODE=$(curl -s -o /tmp/bootstrap_response.txt -w "%{http_code}" \
      -X POST "$LAKEKEEPER_URL/management/v1/bootstrap" \
      -H "Content-Type: application/json" \
      -d '{"accept-terms-of-use": true}')

    if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "204" ]; then
      echo "  Bootstrap successful."
    elif [ "$HTTP_CODE" = "409" ]; then
      echo "  Already bootstrapped, continuing."
    else
      echo "ERROR: Bootstrap failed with HTTP $HTTP_CODE"
      cat /tmp/bootstrap_response.txt
      exit 1
    fi

    # Step 5: Create warehouse (idempotent - check if exists first)
    echo "Checking if warehouse 'garagefs' exists..."
    WAREHOUSES=$(curl -sf "$LAKEKEEPER_URL/management/v1/warehouse" 2>/dev/null || echo "")
    if echo "$WAREHOUSES" | grep -q '"garagefs"'; then
      echo "  Warehouse 'garagefs' already exists, skipping."
    else
      echo "  Creating warehouse 'garagefs'..."
      HTTP_CODE=$(curl -s -o /tmp/warehouse_response.txt -w "%{http_code}" \
        -X POST "$LAKEKEEPER_URL/management/v1/warehouse" \
        -H "Content-Type: application/json" \
        -d "{
          \"warehouse-name\": \"garagefs\",
          \"project-id\": \"00000000-0000-0000-0000-000000000000\",
          \"storage-profile\": {
            \"type\": \"s3\",
            \"bucket\": \"iceberg-warehouse\",
            \"key-prefix\": \"warehouse\",
            \"endpoint\": \"http://garage:3900\",
            \"region\": \"garage\",
            \"path-style-access\": true,
            \"flavor\": \"s3-compat\",
            \"sts-enabled\": false
          },
          \"storage-credential\": {
            \"type\": \"s3\",
            \"credential-type\": \"access-key\",
            \"aws-access-key-id\": \"$KEY_ID\",
            \"aws-secret-access-key\": \"$KEY_SECRET\"
          }
        }")

      if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ]; then
        echo "  Warehouse created successfully."
      elif [ "$HTTP_CODE" = "409" ]; then
        echo "  Warehouse already exists (conflict), continuing."
      else
        echo "ERROR: Warehouse creation failed with HTTP $HTTP_CODE"
        cat /tmp/warehouse_response.txt
        exit 1
      fi
    fi

    echo "=== Lakekeeper Init Complete ==="
    echo "  Warehouse: garagefs"
    echo "  Storage: s3://iceberg-warehouse/warehouse"
    echo "  Catalog endpoint: $LAKEKEEPER_URL/catalog"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: configure-lakekeeper
spec:
  backoffLimit: 50
  template:
    spec:
      serviceAccountName: lakekeeper-init
      containers:
        - name: configure
          image: alpine/kubectl:1.35.2 # renovate: datasource=docker depName=alpine/kubectl
          command: ["/bin/sh", "/scripts/configure.sh"]
          volumeMounts:
            - name: script
              mountPath: /scripts
      restartPolicy: OnFailure
      volumes:
        - name: script
          configMap:
            name: lakekeeper-init-script
            defaultMode: 0755
