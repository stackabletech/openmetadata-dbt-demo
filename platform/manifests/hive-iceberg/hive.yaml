---
apiVersion: hive.stackable.tech/v1alpha1
kind: HiveCluster
metadata:
  name: hive-postgres-iceberg
spec:
  image:
    productVersion: 3.1.3
  clusterConfig:
    database:
      connString: jdbc:postgresql://postgresql-hive-iceberg:5432/hive-iceberg
      credentialsSecret: hive-iceberg-postgresql-credentials
      dbType: postgres
    hdfs:
      configMap: simple-hdfs
  metastore:
    roleGroups:
      default:
        replicas: 1