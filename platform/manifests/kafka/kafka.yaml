---
apiVersion: kafka.stackable.tech/v1alpha1
kind: KafkaCluster
metadata:
  name: kafka
  namespace: platform
spec:
  clusterConfig:
    metadataManager: kraft
  image:
    productVersion: "3.9.1"
  brokers:
    roleGroups:
      default:
        replicas: 3
  controllers:
    roleGroups:
      default:
        replicas: 3
