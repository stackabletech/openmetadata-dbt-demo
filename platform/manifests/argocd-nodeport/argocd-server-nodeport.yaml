---
apiVersion: v1
kind: Service
metadata:
  name: argocd-server-nodeport
  namespace: deployment
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: argocd-server
    app.kubernetes.io/instance: argocd
  ports:
    - name: server
      port: 8080
      targetPort: 8080
      nodePort: 30080
      protocol: TCP
