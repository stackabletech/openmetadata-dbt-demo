---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-landing
  namespace: deployment
  labels:
    app.kubernetes.io/name: demo-landing
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: demo-landing
  template:
    metadata:
      labels:
        app.kubernetes.io/name: demo-landing
    spec:
      serviceAccountName: demo-landing
      volumes:
        - name: git
          emptyDir: {}
      containers:
        - name: landing
          image: oci.stackable.tech/sandbox/demo-landing:0.1.0-dev
          imagePullPolicy: Always
          env:
            - name: CONTENT_DIR
              value: /git/current/website
            - name: LISTEN_ADDR
              value: 0.0.0.0:8080
            - name: LOG_LEVEL
              value: info
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 10
          volumeMounts:
            - name: git
              mountPath: /git
        - name: git-sync
          image: registry.k8s.io/git-sync/git-sync:v4.3.0
          args:
            - --repo=http://forgejo-http.deployment.svc.cluster.local:3000/stackable/openmetadata-dbt-demo.git
            - --ref=main
            - --depth=1
            - --period=30s
            - --root=/git
            - --link=current
          volumeMounts:
            - name: git
              mountPath: /git
