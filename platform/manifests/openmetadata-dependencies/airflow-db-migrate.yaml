---
# Run Airflow DB migrations alongside the chart's pods.
#
# The openmetadata-dependencies Helm chart defines its migration Job as a
# post-install/post-upgrade Helm hook, which ArgoCD maps to PostSync.
# This creates a deadlock: pods wait for migrations in an init container,
# but PostSync only fires after pods are healthy.
#
# This Job runs in the same sync wave as all other chart resources.
# The pods' wait-for-airflow-migrations init containers poll for 60 seconds,
# giving this Job time to complete the migration.
apiVersion: batch/v1
kind: Job
metadata:
  name: openmetadata-airflow-db-migrate
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      securityContext:
        runAsUser: 50000
        fsGroup: 0
      restartPolicy: OnFailure
      containers:
        - name: run-airflow-migrations
          image: docker.getcollate.io/openmetadata/ingestion:1.12.1
          imagePullPolicy: IfNotPresent
          args:
            - bash
            - -c
            - |-
              exec \
              airflow db migrate
          env:
            - name: _PIP_ADDITIONAL_REQUIREMENTS
              value: "apache-airflow-providers-fab==2.4.4"
            - name: AIRFLOW__CORE__AUTH_MANAGER
              value: "airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager"
            - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
              valueFrom:
                secretKeyRef:
                  name: openmetadata-dependencies-metadata
                  key: connection
            - name: AIRFLOW__CORE__SQL_ALCHEMY_CONN
              valueFrom:
                secretKeyRef:
                  name: openmetadata-dependencies-metadata
                  key: connection
          volumeMounts:
            - name: config
              mountPath: /opt/airflow/airflow.cfg
              subPath: airflow.cfg
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: openmetadata-dependencies-config
