---
# Run Airflow DB migrations before the chart's pods start.
#
# The openmetadata-dependencies Helm chart defines its migration Job as a
# post-install/post-upgrade Helm hook, which ArgoCD maps to PostSync.
# This creates a deadlock: pods wait for migrations in an init container,
# but PostSync only fires after pods are healthy.
#
# This Job runs in sync-wave -1, so ArgoCD applies it and waits for
# completion before syncing the chart's pods (wave 0).
apiVersion: batch/v1
kind: Job
metadata:
  name: openmetadata-airflow-db-migrate
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      securityContext:
        runAsUser: 50000
        fsGroup: 0
      restartPolicy: OnFailure
      containers:
        - name: run-airflow-migrations
          image: docker.getcollate.io/openmetadata/ingestion:1.12.1
          imagePullPolicy: IfNotPresent
          args:
            - bash
            - -c
            - |-
              exec \
              airflow db migrate
          env:
            - name: _PIP_ADDITIONAL_REQUIREMENTS
              value: "apache-airflow-providers-fab==2.4.4"
            # The FAB auth manager must be set so db migrate discovers FAB provider migrations.
            # We use an env var instead of mounting the chart's ConfigMap, which doesn't
            # exist yet during PreSync (it's created during Sync).
            - name: AIRFLOW__CORE__AUTH_MANAGER
              value: "airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager"
            - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
              valueFrom:
                secretKeyRef:
                  name: openmetadata-dependencies-metadata
                  key: connection
            - name: AIRFLOW__CORE__SQL_ALCHEMY_CONN
              valueFrom:
                secretKeyRef:
                  name: openmetadata-dependencies-metadata
                  key: connection
