---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: garagefs-init
  namespace: shared
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: garagefs-init
  namespace: shared
rules:
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "update", "patch", "get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: garagefs-init
  namespace: shared
subjects:
  - kind: ServiceAccount
    name: garagefs-init
roleRef:
  kind: Role
  name: garagefs-init
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: garagefs-init
  namespace: platform
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "update", "patch", "get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: garagefs-init
  namespace: platform
subjects:
  - kind: ServiceAccount
    name: garagefs-init
    namespace: shared
roleRef:
  kind: Role
  name: garagefs-init
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: garagefs-init-script
  namespace: shared
data:
  configure.sh: |
    #!/bin/sh
    set -e

    GARAGE_POD="garage-0"
    GARAGE_CMD="kubectl exec $GARAGE_POD -- /garage"

    # Create or get a garage API key, set KEY_ID and KEY_SECRET
    ensure_key() {
      local name="$1"
      echo "Creating API key '$name'..."
      local output
      output=$($GARAGE_CMD key info "$name" 2>&1) || output=$($GARAGE_CMD key create "$name" 2>&1)
      KEY_ID=$(echo "$output" | grep "Key ID:" | awk '{print $NF}')
      KEY_SECRET=$(echo "$output" | grep "Secret key:" | awk '{print $NF}')
      if [ -z "$KEY_ID" ] || [ -z "$KEY_SECRET" ]; then
        echo "ERROR: Failed to extract credentials for key '$name'"
        echo "Output: $output"
        exit 1
      fi
      echo "  Key ID: $KEY_ID"
    }

    # Create a bucket and grant a key full access
    ensure_bucket() {
      local bucket="$1" key="$2"
      echo "Creating bucket '$bucket'..."
      $GARAGE_CMD bucket create "$bucket" 2>/dev/null || true
      $GARAGE_CMD bucket allow --read --write --owner "$bucket" --key "$key" 2>/dev/null || true
    }

    echo "=== GarageFS Init ==="

    # 1. Wait for all garage nodes to join the cluster
    EXPECTED_NODES=$(kubectl get statefulset garage -o jsonpath='{.spec.replicas}')
    echo "Waiting for $EXPECTED_NODES garage nodes..."
    for i in $(seq 1 120); do
      NODE_COUNT=$($GARAGE_CMD status 2>/dev/null | grep -cE '^[0-9a-f]{16}' || echo 0)
      if [ "$NODE_COUNT" -ge "$EXPECTED_NODES" ]; then
        echo "  All $EXPECTED_NODES nodes are present."
        break
      fi
      if [ "$i" -eq 120 ]; then
        echo "ERROR: Only $NODE_COUNT/$EXPECTED_NODES nodes after 120 attempts"
        exit 1
      fi
      echo "  Attempt $i/120 - $NODE_COUNT/$EXPECTED_NODES nodes, retrying in 5s..."
      sleep 5
    done

    # 2. Assign layout to all nodes (idempotent)
    $GARAGE_CMD layout revert 2>/dev/null || true
    UNASSIGNED=$($GARAGE_CMD status 2>/dev/null | grep "NO ROLE ASSIGNED" | awk '{print $1}')
    if [ -n "$UNASSIGNED" ]; then
      echo "Assigning node layout..."
      ALL_NODES=$($GARAGE_CMD status 2>/dev/null | grep -E '^[0-9a-f]{16}' | awk '{print $1}')
      for node_id in $ALL_NODES; do
        $GARAGE_CMD layout assign -z dc1 -c 1G "$node_id" 2>/dev/null || true
      done
      NEXT_VERSION=$(( $($GARAGE_CMD layout show 2>/dev/null | grep "Current cluster layout version:" | awk '{print $NF}') + 1 ))
      $GARAGE_CMD layout apply --version "$NEXT_VERSION"
    else
      echo "All nodes already have roles assigned."
    fi

    # 3. Create API keys, buckets, and store credentials
    ensure_key airflow
    AIRFLOW_KEY_ID="$KEY_ID"
    AIRFLOW_KEY_SECRET="$KEY_SECRET"
    ensure_bucket airflow-logs airflow
    ensure_bucket dbt-artifacts airflow

    ENCODED_SECRET=$(printf '%s' "$AIRFLOW_KEY_SECRET" | sed 's/+/%2B/g; s/\//%2F/g; s/@/%40/g; s/:/%3A/g; s/#/%23/g; s/?/%3F/g; s/&/%26/g; s/=/%3D/g')
    CONN_STRING="aws://${AIRFLOW_KEY_ID}:${ENCODED_SECRET}@/?endpoint_url=http%3A%2F%2Fgarage.shared.svc.cluster.local%3A3900&region_name=garage"
    kubectl create secret generic garagefs-airflow-credentials \
      --from-literal=accessKeyId="$AIRFLOW_KEY_ID" \
      --from-literal=secretAccessKey="$AIRFLOW_KEY_SECRET" \
      --from-literal=airflow-connection="$CONN_STRING" \
      --dry-run=client -o yaml | kubectl apply -f -
    kubectl create secret generic garagefs-airflow-credentials \
      --from-literal=accessKeyId="$AIRFLOW_KEY_ID" \
      --from-literal=secretAccessKey="$AIRFLOW_KEY_SECRET" \
      --from-literal=airflow-connection="$CONN_STRING" \
      -n platform --dry-run=client -o yaml | kubectl apply -f -

    ensure_key lakekeeper
    ensure_bucket iceberg-warehouse lakekeeper
    kubectl create secret generic garagefs-lakekeeper-credentials \
      --from-literal=accessKeyId="$KEY_ID" \
      --from-literal=secretAccessKey="$KEY_SECRET" \
      --dry-run=client -o yaml | kubectl apply -f -
    kubectl create secret generic garagefs-lakekeeper-credentials \
      --from-literal=accessKeyId="$KEY_ID" \
      --from-literal=secretAccessKey="$KEY_SECRET" \
      -n platform --dry-run=client -o yaml | kubectl apply -f -

    echo "=== GarageFS Init Complete ==="
---
apiVersion: batch/v1
kind: Job
metadata:
  name: configure-garagefs-v4
  namespace: shared
spec:
  backoffLimit: 50
  template:
    spec:
      serviceAccountName: garagefs-init
      containers:
        - name: configure
          image: alpine/kubectl:1.35.2 # renovate: datasource=docker depName=alpine/kubectl
          command: ["/bin/sh", "/scripts/configure.sh"]
          volumeMounts:
            - name: script
              mountPath: /scripts
      restartPolicy: OnFailure
      volumes:
        - name: script
          configMap:
            name: garagefs-init-script
            defaultMode: 0755
