---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: configure-stackable-oidc
  namespace: platform
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: configure-stackable-oidc
rules:
  - apiGroups: ["authentication.stackable.tech"]
    resources: ["authenticationclasses"]
    verbs: ["get", "update", "patch"]
    resourceNames: ["trino-keycloak", "airflow-keycloak", "nifi-keycloak", "superset-keycloak"]
  - apiGroups: ["authentication.stackable.tech"]
    resources: ["authenticationclasses"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: configure-stackable-oidc
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: configure-stackable-oidc
subjects:
  - kind: ServiceAccount
    name: configure-stackable-oidc
    namespace: platform
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: configure-stackable-oidc
  namespace: platform
rules:
  - apiGroups: [""]
    resources: ["secrets", "configmaps"]
    verbs: ["get", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: configure-stackable-oidc
  namespace: platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: configure-stackable-oidc
subjects:
  - kind: ServiceAccount
    name: configure-stackable-oidc
    namespace: platform
---
apiVersion: batch/v1
kind: Job
metadata:
  name: configure-stackable-oidc
  namespace: platform
  annotations:
    argocd.argoproj.io/sync-options: Replace=true
spec:
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      serviceAccountName: configure-stackable-oidc
      restartPolicy: Never
      containers:
        - name: kubectl
          image: bitnamilegacy/kubectl:1.31 # renovate: datasource=docker depName=bitnamilegacy/kubectl
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e

              # Poll the ConfigMap *value* (not just existence) so we never
              # render AuthenticationClasses with an empty hostname/port if
              # discover-node-ip hasn't populated the key yet. Bail with
              # exit 1 after the timeout so Replace=true re-runs us on
              # next sync.
              wait_cm_key() {
                ns=$1; cm=$2; key=$3
                for _ in $(seq 1 60); do
                  val=$(kubectl -n "$ns" get cm "$cm" -o jsonpath="{.data.$key}" 2>/dev/null || true)
                  if [ -n "$val" ]; then
                    echo "$val"
                    return 0
                  fi
                  echo "  $cm/$key not populated, retrying in 5s..." >&2
                  sleep 5
                done
                echo "ERROR: $cm/$key still empty after 5min" >&2
                return 1
              }

              KEYCLOAK_HOST=$(wait_cm_key platform oidc-endpoints keycloak-host)
              KEYCLOAK_HOSTNAME="${KEYCLOAK_HOST%:*}"
              KEYCLOAK_PORT="${KEYCLOAK_HOST#*:}"
              if [ -z "$KEYCLOAK_HOSTNAME" ] || [ -z "$KEYCLOAK_PORT" ]; then
                echo "ERROR: malformed keycloak-host '$KEYCLOAK_HOST' (expected host:port)" >&2
                exit 1
              fi
              echo "Keycloak: hostname=$KEYCLOAK_HOSTNAME port=$KEYCLOAK_PORT"

              # === Per-product blocks below ===
              # Each per-product OIDC plan inserts its
              # AuthenticationClass + Secret apply block here.
              # See docs/superpowers/specs/2026-04-28-stackable-stack-oidc-design.md.

              echo "Applying Trino AuthenticationClass + client Secret..."
              kubectl apply -f - <<EOF
              ---
              apiVersion: authentication.stackable.tech/v1alpha1
              kind: AuthenticationClass
              metadata:
                name: trino-keycloak
              spec:
                provider:
                  oidc:
                    hostname: ${KEYCLOAK_HOSTNAME}
                    port: ${KEYCLOAK_PORT}
                    rootPath: /realms/stackable-demo
                    principalClaim: preferred_username
                    scopes:
                      - openid
                      - email
                      - profile
                    providerHint: Keycloak
              ---
              apiVersion: v1
              kind: Secret
              metadata:
                name: trino-keycloak-client
                namespace: platform
              type: Opaque
              stringData:
                clientId: trino
                clientSecret: trino-secret
              EOF

              echo "Applying Airflow AuthenticationClass + client Secret..."
              kubectl apply -f - <<EOF
              ---
              apiVersion: authentication.stackable.tech/v1alpha1
              kind: AuthenticationClass
              metadata:
                name: airflow-keycloak
              spec:
                provider:
                  oidc:
                    hostname: ${KEYCLOAK_HOSTNAME}
                    port: ${KEYCLOAK_PORT}
                    rootPath: /realms/stackable-demo
                    principalClaim: preferred_username
                    scopes:
                      - openid
                      - email
                      - profile
                    providerHint: Keycloak
              ---
              apiVersion: v1
              kind: Secret
              metadata:
                name: airflow-keycloak-client
                namespace: platform
              type: Opaque
              stringData:
                clientId: airflow
                clientSecret: airflow-secret
              EOF

              echo "Applying Superset AuthenticationClass + client Secret..."
              kubectl apply -f - <<EOF
              ---
              apiVersion: authentication.stackable.tech/v1alpha1
              kind: AuthenticationClass
              metadata:
                name: superset-keycloak
              spec:
                provider:
                  oidc:
                    hostname: ${KEYCLOAK_HOSTNAME}
                    port: ${KEYCLOAK_PORT}
                    rootPath: /realms/stackable-demo
                    principalClaim: preferred_username
                    scopes:
                      - openid
                      - email
                      - profile
                    providerHint: Keycloak
              ---
              apiVersion: v1
              kind: Secret
              metadata:
                name: superset-keycloak-client
                namespace: platform
              type: Opaque
              stringData:
                clientId: superset
                clientSecret: superset-secret
              EOF

              echo "Applying NiFi AuthenticationClass + client Secret..."
              kubectl apply -f - <<EOF
              ---
              apiVersion: authentication.stackable.tech/v1alpha1
              kind: AuthenticationClass
              metadata:
                name: nifi-keycloak
              spec:
                provider:
                  oidc:
                    hostname: ${KEYCLOAK_HOSTNAME}
                    port: ${KEYCLOAK_PORT}
                    rootPath: /realms/stackable-demo
                    principalClaim: preferred_username
                    scopes:
                      - openid
                      - email
                      - profile
                    providerHint: Keycloak
              ---
              apiVersion: v1
              kind: Secret
              metadata:
                name: nifi-keycloak-client
                namespace: platform
              type: Opaque
              stringData:
                clientId: nifi
                clientSecret: nifi-secret
              EOF
