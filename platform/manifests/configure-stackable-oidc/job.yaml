---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: configure-stackable-oidc
  namespace: platform
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: configure-stackable-oidc
rules:
  - apiGroups: ["authentication.stackable.tech"]
    resources: ["authenticationclasses"]
    verbs: ["get", "update", "patch"]
    resourceNames: ["trino-keycloak", "airflow-keycloak", "nifi-keycloak", "superset-keycloak"]
  - apiGroups: ["authentication.stackable.tech"]
    resources: ["authenticationclasses"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: configure-stackable-oidc
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: configure-stackable-oidc
subjects:
  - kind: ServiceAccount
    name: configure-stackable-oidc
    namespace: platform
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: configure-stackable-oidc
  namespace: platform
rules:
  - apiGroups: [""]
    resources: ["secrets", "configmaps"]
    verbs: ["get", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: configure-stackable-oidc
  namespace: platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: configure-stackable-oidc
subjects:
  - kind: ServiceAccount
    name: configure-stackable-oidc
    namespace: platform
---
apiVersion: batch/v1
kind: Job
metadata:
  name: configure-stackable-oidc
  namespace: platform
  annotations:
    argocd.argoproj.io/sync-options: Replace=true
spec:
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      serviceAccountName: configure-stackable-oidc
      restartPolicy: Never
      containers:
        - name: kubectl
          image: bitnamilegacy/kubectl:1.31 # renovate: datasource=docker depName=bitnamilegacy/kubectl
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e

              echo "Waiting for oidc-endpoints ConfigMap..."
              until kubectl -n platform get cm oidc-endpoints >/dev/null 2>&1; do
                echo "  not ready, retrying in 5s..."
                sleep 5
              done

              KEYCLOAK_HOST=$(kubectl -n platform get cm oidc-endpoints -o jsonpath='{.data.keycloak-host}')
              KEYCLOAK_HOSTNAME="${KEYCLOAK_HOST%:*}"
              KEYCLOAK_PORT="${KEYCLOAK_HOST#*:}"
              echo "Keycloak: hostname=$KEYCLOAK_HOSTNAME port=$KEYCLOAK_PORT"

              # === Per-product blocks below ===
              # Each per-product OIDC plan inserts its
              # AuthenticationClass + Secret apply block here.
              # See docs/superpowers/specs/2026-04-28-stackable-stack-oidc-design.md.

              echo "Applying Trino AuthenticationClass + client Secret..."
              kubectl apply -f - <<EOF
              ---
              apiVersion: authentication.stackable.tech/v1alpha1
              kind: AuthenticationClass
              metadata:
                name: trino-keycloak
              spec:
                provider:
                  oidc:
                    hostname: ${KEYCLOAK_HOSTNAME}
                    port: ${KEYCLOAK_PORT}
                    rootPath: /realms/stackable-demo
                    principalClaim: preferred_username
                    scopes:
                      - openid
                      - email
                      - profile
                    providerHint: Keycloak
              ---
              apiVersion: v1
              kind: Secret
              metadata:
                name: trino-keycloak-client
                namespace: platform
              type: Opaque
              stringData:
                clientId: trino
                clientSecret: trino-secret
              EOF

              echo "Applying Airflow AuthenticationClass + client Secret..."
              kubectl apply -f - <<EOF
              ---
              apiVersion: authentication.stackable.tech/v1alpha1
              kind: AuthenticationClass
              metadata:
                name: airflow-keycloak
              spec:
                provider:
                  oidc:
                    hostname: ${KEYCLOAK_HOSTNAME}
                    port: ${KEYCLOAK_PORT}
                    rootPath: /realms/stackable-demo
                    principalClaim: preferred_username
                    scopes:
                      - openid
                      - email
                      - profile
                    providerHint: Keycloak
              ---
              apiVersion: v1
              kind: Secret
              metadata:
                name: airflow-keycloak-client
                namespace: platform
              type: Opaque
              stringData:
                clientId: airflow
                clientSecret: airflow-secret
              EOF
