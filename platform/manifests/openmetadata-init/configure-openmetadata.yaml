---
apiVersion: v1
kind: ConfigMap
metadata:
  name: openmetadata-init-script
  namespace: platform
data:
  configure.py: |
    #!/usr/bin/env python3
    """Configure OpenMetadata: register Trino as a database service and create ingestion pipelines."""

    import base64
    import json
    import os
    import sys
    import time
    import urllib.request
    import urllib.error

    OM_HOST = os.environ.get("OM_HOST", "http://openmetadata:8585")
    API = f"{OM_HOST}/api/v1"

    OM_ADMIN_EMAIL = os.environ.get("OM_ADMIN_EMAIL", "admin@open-metadata.org")
    OM_ADMIN_PASSWORD = os.environ.get("OM_ADMIN_PASSWORD", "admin")

    TRINO_HOST = os.environ.get("TRINO_HOST", "trino-coordinator")
    TRINO_PORT = os.environ.get("TRINO_PORT", "8443")
    TRINO_SCHEME = os.environ.get("TRINO_SCHEME", "https")
    TRINO_USER = os.environ.get("TRINO_USER", "admin")

    MAX_RETRIES = int(os.environ.get("MAX_RETRIES", "60"))
    RETRY_INTERVAL = int(os.environ.get("RETRY_INTERVAL", "10"))

    SERVICE_NAME = "trino"
    PIPELINE_NAME = f"{SERVICE_NAME}_metadata_ingestion"


    def api_request(path, method="GET", data=None, token=None):
        """Make an API request to OpenMetadata."""
        url = f"{API}{path}"
        headers = {"Content-Type": "application/json"}
        if token:
            headers["Authorization"] = f"Bearer {token}"
        body = json.dumps(data).encode() if data else None
        req = urllib.request.Request(url, data=body, headers=headers, method=method)
        try:
            with urllib.request.urlopen(req) as resp:
                return json.loads(resp.read().decode())
        except urllib.error.HTTPError as e:
            error_body = e.read().decode() if e.fp else ""
            print(f"  HTTP {e.code} for {method} {url}: {error_body}", file=sys.stderr)
            raise


    def wait_for_api():
        """Wait until the OpenMetadata API is ready."""
        print(f"Waiting for OpenMetadata API at {API} ...")
        for i in range(MAX_RETRIES):
            try:
                api_request("/system/version")
                print("  OpenMetadata API is ready.")
                return
            except Exception:
                print(f"  Attempt {i+1}/{MAX_RETRIES} — not ready, retrying in {RETRY_INTERVAL}s ...")
                time.sleep(RETRY_INTERVAL)
        print("ERROR: OpenMetadata API did not become ready.", file=sys.stderr)
        sys.exit(1)


    def login():
        """Log in with basic auth and return an access token."""
        print(f"Logging in as {OM_ADMIN_EMAIL} ...")
        password_b64 = base64.b64encode(OM_ADMIN_PASSWORD.encode()).decode()
        result = api_request(
            "/users/login",
            method="POST",
            data={"email": OM_ADMIN_EMAIL, "password": password_b64},
        )
        token = result.get("accessToken")
        if not token:
            print("ERROR: Login did not return an access token.", file=sys.stderr)
            sys.exit(1)
        print("  Logged in successfully.")
        return token


    def create_database_service(token):
        """Create or update the Trino database service."""
        print(f"Creating/updating database service '{SERVICE_NAME}' ...")
        payload = {
            "name": SERVICE_NAME,
            "serviceType": "Trino",
            "connection": {
                "config": {
                    "type": "Trino",
                    "scheme": "trino",
                    "hostPort": f"{TRINO_HOST}:{TRINO_PORT}",
                    "username": TRINO_USER,
                    "connectionArguments": {
                        "http_scheme": TRINO_SCHEME,
                        "verify": False
                    }
                }
            }
        }
        result = api_request("/services/databaseServices", method="PUT", data=payload, token=token)
        service_id = result["id"]
        fqn = result["fullyQualifiedName"]
        print(f"  Service created/updated: {fqn} (id={service_id})")
        return result


    def create_ingestion_pipeline(token, service):
        """Create or update a metadata ingestion pipeline for the Trino service."""
        print(f"Creating/updating ingestion pipeline '{PIPELINE_NAME}' ...")
        service_ref = {
            "id": service["id"],
            "type": "databaseService"
        }
        payload = {
            "name": PIPELINE_NAME,
            "pipelineType": "metadata",
            "service": service_ref,
            "sourceConfig": {
                "config": {
                    "type": "DatabaseMetadata",
                    "markDeletedTables": True,
                    "includeTables": True,
                    "includeViews": True
                }
            },
            "airflowConfig": {
                "scheduleInterval": "0 */6 * * *"
            }
        }
        result = api_request("/services/ingestionPipelines", method="PUT", data=payload, token=token)
        pipeline_id = result["id"]
        print(f"  Pipeline created/updated: {result['fullyQualifiedName']} (id={pipeline_id})")
        return result


    DBT_PIPELINE_NAME = f"{SERVICE_NAME}_dbt_ingestion"

    S3_ACCESS_KEY = os.environ.get("S3_ACCESS_KEY", "")
    S3_SECRET_KEY = os.environ.get("S3_SECRET_KEY", "")
    S3_ENDPOINT = os.environ.get("S3_ENDPOINT", "http://garage.shared.svc.cluster.local:3900")
    S3_REGION = os.environ.get("S3_REGION", "garage")
    DBT_BUCKET = os.environ.get("DBT_BUCKET", "dbt-artifacts")
    DBT_PREFIX = os.environ.get("DBT_PREFIX", "tpch_demo")


    def create_dbt_pipeline(token, service):
        """Create or update a dbt ingestion pipeline for the Trino service."""
        print(f"Creating/updating dbt pipeline '{DBT_PIPELINE_NAME}' ...")
        service_ref = {
            "id": service["id"],
            "type": "databaseService"
        }
        payload = {
            "name": DBT_PIPELINE_NAME,
            "pipelineType": "dbt",
            "service": service_ref,
            "sourceConfig": {
                "config": {
                    "type": "DBT",
                    "dbtConfigSource": {
                        "dbtConfigType": "s3",
                        "dbtSecurityConfig": {
                            "awsAccessKeyId": S3_ACCESS_KEY,
                            "awsSecretAccessKey": S3_SECRET_KEY,
                            "awsRegion": S3_REGION,
                            "endPointURL": S3_ENDPOINT
                        },
                        "dbtPrefixConfig": {
                            "dbtBucketName": DBT_BUCKET,
                            "dbtObjectPrefix": DBT_PREFIX
                        }
                    },
                    "dbtUpdateDescriptions": True,
                    "includeTags": True
                }
            },
            "airflowConfig": {
                "scheduleInterval": "0 */6 * * *"
            }
        }
        result = api_request("/services/ingestionPipelines", method="PUT", data=payload, token=token)
        pipeline_id = result["id"]
        print(f"  dbt pipeline created/updated: {result['fullyQualifiedName']} (id={pipeline_id})")
        return result


    def trigger_search_reindex(token):
        """Trigger the SearchIndexingApplication to create/update search indexes."""
        print("Triggering search reindex ...")
        url = f"{API}/apps/trigger/SearchIndexingApplication"
        headers = {"Content-Type": "application/json", "Authorization": f"Bearer {token}"}
        req = urllib.request.Request(url, headers=headers, method="POST")
        try:
            with urllib.request.urlopen(req) as resp:
                resp.read()
            print("  Search reindex triggered successfully.")
        except urllib.error.HTTPError as e:
            if e.code == 404:
                print("  WARNING: SearchIndexingApplication not found, skipping reindex.", file=sys.stderr)
            else:
                error_body = e.read().decode() if e.fp else ""
                print(f"  HTTP {e.code} triggering reindex: {error_body}", file=sys.stderr)
                raise


    def main():
        wait_for_api()
        token = login()
        trigger_search_reindex(token)
        service = create_database_service(token)
        create_ingestion_pipeline(token, service)
        create_dbt_pipeline(token, service)
        print("Done — Trino is registered in OpenMetadata with metadata and dbt pipelines.")


    if __name__ == "__main__":
        main()
---
apiVersion: batch/v1
kind: Job
metadata:
  name: configure-openmetadata-v2
  namespace: platform
spec:
  backoffLimit: 50
  template:
    spec:
      containers:
        - name: configure
          image: python:3.12-slim # renovate: datasource=docker depName=python
          command: ["python", "-u", "/scripts/configure.py"]
          env:
            - name: OM_HOST
              value: "http://openmetadata:8585"
            - name: TRINO_HOST
              value: "trino-coordinator"
            - name: TRINO_PORT
              value: "8443"
            - name: TRINO_SCHEME
              value: "https"
            - name: TRINO_USER
              value: "admin"
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: garagefs-airflow-credentials
                  key: accessKeyId
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: garagefs-airflow-credentials
                  key: secretAccessKey
          volumeMounts:
            - name: script
              mountPath: /scripts
      restartPolicy: OnFailure
      volumes:
        - name: script
          configMap:
            name: openmetadata-init-script
