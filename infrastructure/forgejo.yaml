---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: forgejo
  namespace: deployment
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: dbt-openmetadata-demo
  destination:
    server: https://kubernetes.default.svc
    namespace: deployment
  sources:
    - repoURL: code.forgejo.org/forgejo-helm
      targetRevision: "16.2.1" # renovate: registryUrl=https://code.forgejo.org/forgejo-helm datasource=helm depName=forgejo
      chart: forgejo
      helm:
        releaseName: forgejo
        valuesObject:
          gitea:
            admin:
              existingSecret: forgejo-admin-secret
            # ROOT_URL/DOMAIN come from the discover-node-ip ConfigMap so the
            # values follow the cluster's external IP. NODE_IP must appear
            # first in this list — Kubernetes substitutes $(VAR) only when
            # VAR was declared earlier in the same container's env list.
            additionalConfigFromEnvs:
              - name: NODE_IP
                valueFrom:
                  configMapKeyRef:
                    name: oidc-endpoints
                    key: node-ip
              - name: GITEA__SERVER__ROOT_URL
                value: "http://$(NODE_IP):30000/"
              - name: GITEA__SERVER__DOMAIN
                value: "$(NODE_IP)"
    - repoURL: "https://github.com/stackabletech/openmetadata-dbt-demo.git"
      targetRevision: "main"
      path: infrastructure/forgejo-manifests/
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      selfHeal: true
      prune: true
