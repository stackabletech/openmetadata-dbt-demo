---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: default
  sources:
    - repoURL: "registry-1.docker.io/bitnamicharts"
      path: sealed-secrets
      targetRevision: 2.5.16 # renovate: registryUrl=https://registry-1.docker.io/bitnamicharts datasource=helm depName=sealed-secrets
      chart: sealed-secrets
      helm:
        releaseName: sealed-secrets-controller
        valuesObject:
          global:
            security:
              allowInsecureImages: true
          image:
            repository: bitnamilegacy/sealed-secrets-controller
          keyRenewPeriod: 8760h00m00s
          secretName: sealed-secrets-key
    # TODO(@maltesander): This should be parameterized with customGitUrl and customGitBranch parameters.
    # Currently these parameters are defined in the demo-v2.yaml and are
    # not picked up in the stack - What to do?
    # TODO(@maltesander):S Must be adapted in case of release!
    - repoURL: https://github.com/stackabletech/openmetadata-dbt-demo
      targetRevision: main
      path: infrastructure/sealed-secrets-manifests/
  destination:
    server: https://kubernetes.default.svc
    namespace: deployment
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      selfHeal: true
      prune: true
