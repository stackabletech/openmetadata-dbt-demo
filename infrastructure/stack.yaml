---
stacks:
  forgejo:
    description: Stack with Forgejo repository that configures mirroring of repo
    stackableRelease: dev # This does not matter -> managed by ArgoCD
    stackableOperators: ["argo-deploys-operators"]
    labels:
      - forgejo
      - gitops
    manifests:
      ################################
      # bootstrap argo
      ################################
      - helmChart: https://raw.githubusercontent.com/stackabletech/openmetadata-dbt-demo/main/infrastructure/argo-cd.yaml
      ################################
      # prerequisites
      ################################openmetadata-dbt-demo
      - plainYaml: https://raw.githubusercontent.com/stackabletech/openmetadata-dbt-demo/main/infrastructure/sealed-secrets.yaml
      ################################
      # project - operators
      ################################
      - plainYaml: https://raw.githubusercontent.com/stackabletech/openmetadata-dbt-demo/main/infrastructure/stackable-operators.yaml
      ################################
      # applicationset - operators
      ################################
      - plainYaml: https://raw.githubusercontent.com/stackabletech/openmetadata-dbt-demo/main/infrastructure/stackable-operators-appset.yaml
      ################################
      # applicationset - ForgeJo-installed and clones this repo, argo then looks at the in-cluster Forgejo, so that
      # users can push changes without breaking the demo
      ################################
      - plainYaml: https://raw.githubusercontent.com/stackabletech/openmetadata-dbt-demo/main/infrastructure/forgejo.yaml
      ################################
      # applicationset - demo
      ################################
      - plainYaml: https://raw.githubusercontent.com/stackabletech/openmetadata-dbt-demo/main/infrastructure/project.yaml
      - plainYaml: https://raw.githubusercontent.com/stackabletech/openmetadata-dbt-demo/main/infrastructure/cluster-apps.yaml
    supportedNamespaces: []
    resourceRequests:
      cpu: 1750m
      memory: 1714Mi
      pvc: 110Gi
    parameters:
      - name: forgejoAdminPassword
        description: Password of the Forgejo admin user
        default: stackable
      - name: forgejoAdminUser
        description: Username of the Forgejo admin user
        default: stackable
      - name: stackableReleaseVersion
        description: The Stackable release to be installed via Argo. This replaces the demo `stackableRelease` parameter.
        # TODO(@maltesander): Must be adapted in case of release !
        default: 0.0.0-dev
      - name: argocdAdminPassword
        description: Password of the ArgoCD admin user.
        # generated via: `htpasswd -nbBC 10 "" adminadmin | tr -d ':\n'`
        default: $2y$10$HhJC3pGHTlk8RyBoS39N/.wC72mdWxV2X8QS1wROUwCFxl.2tGfky