---
apiVersion: v1
kind: Service
metadata:
  name: forgejo-http-nodeport
  namespace: deployment
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: forgejo
    app.kubernetes.io/instance: forgejo
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      nodePort: 30000
      protocol: TCP
