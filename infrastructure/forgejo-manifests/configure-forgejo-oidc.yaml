---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: configure-forgejo-oidc
  namespace: deployment
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: configure-forgejo-oidc
  namespace: deployment
rules:
  - apiGroups: [""]
    resources: ["pods", "configmaps"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: configure-forgejo-oidc
  namespace: deployment
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: configure-forgejo-oidc
subjects:
  - kind: ServiceAccount
    name: configure-forgejo-oidc
    namespace: deployment
---
apiVersion: batch/v1
kind: Job
metadata:
  name: configure-forgejo-oidc
  namespace: deployment
  annotations:
    argocd.argoproj.io/sync-options: Replace=true
spec:
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      serviceAccountName: configure-forgejo-oidc
      restartPolicy: Never
      containers:
        - name: kubectl
          image: bitnamilegacy/kubectl:1.31 # renovate: datasource=docker depName=bitnamilegacy/kubectl
          command: ["/bin/sh", "-c"]
          args:
            - |
              # Poll the ConfigMap *value* (not just existence) so we never
              # configure Forgejo with an empty discover URL if
              # discover-node-ip hasn't populated the key yet. Bail with
              # exit 1 after the timeout so Replace=true re-runs us on
              # next sync.
              wait_cm_key() {
                ns=$1; cm=$2; key=$3
                for _ in $(seq 1 60); do
                  val=$(kubectl -n "$ns" get cm "$cm" -o jsonpath="{.data.$key}" 2>/dev/null || true)
                  if [ -n "$val" ]; then
                    echo "$val"
                    return 0
                  fi
                  echo "  $cm/$key not populated, retrying in 5s..." >&2
                  sleep 5
                done
                echo "ERROR: $cm/$key still empty after 5min" >&2
                return 1
              }

              ISSUER_URL=$(wait_cm_key deployment oidc-endpoints issuer-url) || exit 1
              echo "Issuer URL: $ISSUER_URL"

              # Retry loop: on any failure (Forgejo not ready, transient exec
              # error, partially-initialised app.ini, etc.) sleep and try
              # again. Exits 0 once the auth source either exists or is
              # successfully created — keeps the Job to a single pod instead
              # of stacking up Error pods.
              while true; do
                POD=$(kubectl -n deployment get pods -l app.kubernetes.io/name=forgejo \
                  -o jsonpath='{range .items[?(@.status.phase=="Running")]}{.metadata.name}{"\n"}{end}' \
                  2>/dev/null | head -n1)
                if [ -z "$POD" ]; then
                  echo "  no Forgejo pod yet, retrying in 10s..."
                  sleep 10
                  continue
                fi

                EXISTING=$(kubectl -n deployment exec "$POD" -c forgejo -- \
                  gitea admin auth list 2>/dev/null \
                  | awk 'NR>1 {print $2}')

                if echo "$EXISTING" | grep -qx "Keycloak"; then
                  echo "Keycloak auth source exists on pod $POD. Done."
                  exit 0
                fi

                echo "Creating Keycloak OIDC auth source on pod $POD..."
                if kubectl -n deployment exec "$POD" -c forgejo -- \
                     gitea admin auth add-oauth \
                       --name Keycloak \
                       --provider openidConnect \
                       --key forgejo \
                       --secret forgejo-secret \
                       --auto-discover-url "${ISSUER_URL}/.well-known/openid-configuration" \
                       --scopes "openid profile email roles" \
                       --group-claim-name realm_access.roles \
                       --admin-group admin; then
                  echo "Keycloak auth source created."
                  exit 0
                fi

                echo "  create failed; retrying in 10s..."
                sleep 10
              done
