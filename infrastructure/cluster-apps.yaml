---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-apps
  namespace: default
spec:
  project: dbt-openmetadata-demo
  source:
    repoURL: http://forgejo-http:3000/stackable/openmetadata-dbt-demo.git
    targetRevision: main
    path: platform/applications/
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
