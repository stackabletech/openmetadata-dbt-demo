    resource "keycloak_openid_client" "openmetadata" {
      realm_id              = keycloak_realm.stackable_demo.id
      client_id             = "openmetadata"
      name                  = "OpenMetadata"
      enabled               = true
      access_type           = "CONFIDENTIAL"
      client_secret         = "openmetadata-secret"
      standard_flow_enabled = true
