---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: configure-argocd-oidc
  namespace: deployment
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: configure-argocd-oidc
  namespace: deployment
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: configure-argocd-oidc
  namespace: deployment
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: configure-argocd-oidc
subjects:
  - kind: ServiceAccount
    name: configure-argocd-oidc
    namespace: deployment
---
apiVersion: batch/v1
kind: Job
metadata:
  name: configure-argocd-oidc
  namespace: deployment
  annotations:
    argocd.argoproj.io/sync-options: Replace=true
spec:
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      serviceAccountName: configure-argocd-oidc
      restartPolicy: Never
      containers:
        - name: kubectl
          image: bitnamilegacy/kubectl:1.31 # renovate: datasource=docker depName=bitnamilegacy/kubectl
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e

              # Poll the ConfigMap *values* (not just existence) so we never
              # patch argocd-cm with an empty issuer if discover-node-ip
              # hasn't finished populating the keys yet. Bail with exit 1
              # after the timeout so Replace=true re-runs us on next sync.
              wait_cm_key() {
                ns=$1; cm=$2; key=$3
                for _ in $(seq 1 60); do
                  val=$(kubectl -n "$ns" get cm "$cm" -o jsonpath="{.data.$key}" 2>/dev/null || true)
                  if [ -n "$val" ]; then
                    echo "$val"
                    return 0
                  fi
                  echo "  $cm/$key not populated, retrying in 5s..." >&2
                  sleep 5
                done
                echo "ERROR: $cm/$key still empty after 5min" >&2
                return 1
              }

              ISSUER_URL=$(wait_cm_key deployment oidc-endpoints issuer-url)
              ARGOCD_URL=$(wait_cm_key deployment oidc-endpoints argocd-base-url)
              echo "Issuer:  $ISSUER_URL"
              echo "ArgoCD:  $ARGOCD_URL"

              cat > /tmp/argocd-cm-patch.yaml <<PATCH
              data:
                url: "${ARGOCD_URL}"
                # Disable the local admin/adminadmin login so the only
                # login affordance is "Sign in with Keycloak". Combined
                # with the demo-landing link pointing to /auth/login,
                # users in the happy path never see ArgoCD's login UI.
                admin.enabled: "false"
                oidc.config: |
                  name: Keycloak
                  issuer: ${ISSUER_URL}
                  clientID: argocd
                  clientSecret: argocd-secret
                  requestedScopes:
                    - openid
                    - profile
                    - email
                    - roles
                  requestedIDTokenClaims:
                    realm_access:
                      essential: true
              PATCH

              kubectl patch configmap argocd-cm -n deployment \
                --type=merge --patch-file=/tmp/argocd-cm-patch.yaml

              cat > /tmp/argocd-rbac-cm-patch.yaml <<PATCH
              data:
                policy.default: ""
                policy.csv: |
                  g, admin, role:admin
                  g, viewer, role:readonly
              PATCH

              kubectl patch configmap argocd-rbac-cm -n deployment \
                --type=merge --patch-file=/tmp/argocd-rbac-cm-patch.yaml

              echo "ArgoCD OIDC patch applied."
